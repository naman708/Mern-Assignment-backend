services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    # env_file supplies MYSQL_ROOT_PASSWORD (other app vars present are ignored by MySQL).
    env_file:
      - .env.docker
    environment:
      MYSQL_DATABASE: mern_assignment
    ports:
      # Exposed on host 3307 to avoid clashing with a local MySQL on 3306.
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    # env_file provides DB_PASSWORD, JWT secrets, email config, URLs.
    env_file:
      - .env.docker
    environment:
      # Service-discovery overrides — point Sequelize/Redis at the containers.
      NODE_ENV: production
      PORT: 5000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: mern_assignment
      DB_USER: root
      DB_SSL: "false"
      REDIS_URL: redis://redis:6379
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads

volumes:
  mysql_data:
  redis_data:
  uploads_data:
